<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library system dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">
          <img src="../image/logo.png" alt="" />
          <p class="logo_title">Library</p>
        </div>

        <ul class="nav-link">
          <li class="link active">Home</li>
          <li class="link active">Books</li>
          <li class="link">Profile</li>
          <!-- <li class="nav-item">Loans</a></li>
                <li class="nav-item">Settings</a></li> -->
        </ul>
      </nav>
    </header>

    <main class="main-content">
      <div class="dash-title">
        <h1 class="title">Library system management</h1>
        <button class="add-book" id="add-book">Add book</button>
      </div>

      <div class="modal" id="modal">
        <div class="modal-content">
          <div class="modal-title">
            <h2>add new book</h2>
            <button id="close-model">✕</button>
          </div>
            <form class="form-content">
                <div class="input-wraper">
                    <label for="title">Title</label>
                    <input type="text" id="title">
                </div> <br>

                <div class="input-wraper">
                    <label for="author">Author</label>
                    <input type="text" id="author">
                </div><br>
                <div class="input-wraper">
                    <label for="description">Description</label>
                    <input type="text" id="description">
                </div><br>
                <div class="input-wraper">
                    <label for="image">image</label>
                    <input type="text" id="image" >
                </div><br>
                <button type="submit">submit</button>
            </form>
        </div>
        
      </div>
      
        </div>
        <div class="content-section">
          <table class="table-container">
            <thead>
              <tr>id</tr>
              <tr>name</tr>
              <tr>author</tr>
              <tr>description</tr>
              <tr>image</tr>
              <tr>price</tr>
            </thead>
            <tbody id="table-body">

            </tbody>
          </table>
          <div class="empty-state" id="empty-state ">
            <p>no books found</p>
            <p>click add book to add</p>
          </div>


    </main>
    <script src="./dashboard.js"></script>
  </body>
</html>
